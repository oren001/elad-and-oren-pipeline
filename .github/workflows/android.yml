name: Build Claude OS APK

on:
  push:
    branches:
      - "claude/custom-os-pixel-**"
      - main
      - master
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename $APK_PATH)" >> "$GITHUB_OUTPUT"
          ls -la "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-os-debug-apk
          path: android/${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish rolling pre-release
        if: github.ref == 'refs/heads/claude/custom-os-pixel-N4GIb' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-debug
          name: Claude OS — latest debug build
          prerelease: true
          body: |
            Auto-built debug APK from the `${{ github.ref_name }}` branch (commit `${{ github.sha }}`).

            **Install on your Pixel 7 Pro:**
            1. Open this page in Chrome on the Pixel.
            2. Tap the `app-debug.apk` asset below to download.
            3. Allow Chrome to install unknown apps the first time.
            4. Tap Install. The "Claude OS" app appears.
            5. `Settings → Apps → Default apps → Home app → Claude OS`. Press Home — you're in.
          files: android/${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
