name: Deploy mastulon-chat to Cloudflare Pages

on:
  push:
    branches: [claude/deploy-stoner-chatbot-cloudflare-mm22U]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (next-on-pages)
        run: npx @cloudflare/next-on-pages

      - name: Ensure Pages project exists
        run: |
          set -e
          if npx wrangler pages project list 2>/dev/null | grep -qE '(^|[[:space:]])mastulon-chat([[:space:]]|$)'; then
            echo "Project mastulon-chat already exists"
          else
            echo "Creating Pages project mastulon-chat with nodejs_compat..."
            npx wrangler pages project create mastulon-chat \
              --production-branch=main \
              --compatibility-flags=nodejs_compat
          fi

      - name: Ensure KV namespace exists & write wrangler.toml
        shell: bash
        run: |
          set -e

          echo "::group::list namespaces"
          set +e
          LIST_OUT=$(npx wrangler kv namespace list 2>&1)
          set -e
          echo "$LIST_OUT"
          echo "::endgroup::"

          NS_ID=$(printf '%s' "$LIST_OUT" | python3 -c '
          import json, sys
          raw = sys.stdin.read().strip()
          try:
              data = json.loads(raw)
          except Exception:
              data = []
          if not isinstance(data, list):
              data = []
          wanted = ("mastulon-state", "mastulon-chat-mastulon-state")
          ids = [x.get("id") for x in data if isinstance(x, dict) and x.get("title") in wanted]
          print(ids[0] if ids else "")
          ' || true)

          if [ -z "$NS_ID" ]; then
            echo "::group::create namespace"
            set +e
            CREATE_OUT=$(npx wrangler kv namespace create mastulon-state 2>&1)
            set -e
            echo "$CREATE_OUT"
            echo "::endgroup::"
            NS_ID=$(printf '%s' "$CREATE_OUT" | grep -oE 'id ?= ?"[a-f0-9]{32}"' | head -1 | sed -E 's/.*"([a-f0-9]{32})".*/\1/' || true)
          fi

          if [ -z "$NS_ID" ]; then
            echo "::error::Failed to obtain KV namespace ID"
            exit 1
          fi

          echo "KV namespace id: $NS_ID"
          cat > wrangler.toml <<TOML
          name = "mastulon-chat"
          compatibility_date = "2024-11-01"
          compatibility_flags = ["nodejs_compat"]
          pages_build_output_dir = ".vercel/output/static"

          [[kv_namespaces]]
          binding = "MASTULON_KV"
          id = "$NS_ID"
          TOML
          cat wrangler.toml

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=mastulon-chat --branch=main --commit-dirty=true
