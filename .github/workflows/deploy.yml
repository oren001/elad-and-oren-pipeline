name: Deploy mastulon-chat to Cloudflare Pages

on:
  push:
    branches: [claude/deploy-stoner-chatbot-cloudflare-mm22U]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (next-on-pages)
        run: npx @cloudflare/next-on-pages

      - name: Ensure Pages project exists
        run: |
          set -e
          if npx wrangler pages project list 2>/dev/null | grep -qE '(^|[[:space:]])mastulon-chat([[:space:]]|$)'; then
            echo "Project mastulon-chat already exists"
          else
            echo "Creating Pages project mastulon-chat with nodejs_compat..."
            npx wrangler pages project create mastulon-chat \
              --production-branch=main \
              --compatibility-flags=nodejs_compat
          fi

      - name: List KV namespaces (diagnostic — copy ID from this log)
        shell: bash
        continue-on-error: true
        run: |
          echo "============================================================"
          echo "  COPY THE 'id' VALUE FOR title='mastulon-state' FROM BELOW"
          echo "============================================================"
          npx wrangler kv namespace list 2>&1 || echo "(list failed)"
          echo "============================================================"

      - name: Write wrangler.toml from KV_NAMESPACE_ID secret (if set)
        shell: bash
        run: |
          set -e
          if [ -n "${{ secrets.KV_NAMESPACE_ID }}" ]; then
            echo "Using KV_NAMESPACE_ID from repo secret"
            cat > wrangler.toml <<TOML
          name = "mastulon-chat"
          compatibility_date = "2024-11-01"
          compatibility_flags = ["nodejs_compat"]
          pages_build_output_dir = ".vercel/output/static"

          [[kv_namespaces]]
          binding = "MASTULON_KV"
          id = "${{ secrets.KV_NAMESPACE_ID }}"
          TOML
            cat wrangler.toml
          else
            echo "::warning::KV_NAMESPACE_ID secret not set — deploying without KV binding (room/push will not work)"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=mastulon-chat --branch=main --commit-dirty=true
